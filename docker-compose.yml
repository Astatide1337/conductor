services:
  conductor:
    build: .
    ports:
      - "127.0.0.1:${CONDUCTOR_PORT:-8093}:8093"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - CONDUCTOR_STORAGE__SQLITE_PATH=/data/conductor.db
      - CONDUCTOR_AUTH__MODE=${CONDUCTOR_AUTH_MODE:-dev-none}
      - CONDUCTOR_OBSERVABILITY__LOG_FORMAT=${CONDUCTOR_LOG_FORMAT:-json}
      - CONDUCTOR_OBSERVABILITY__LOG_LEVEL=${CONDUCTOR_LOG_LEVEL:-INFO}
      - CONDUCTOR_ENVIRONMENT=${CONDUCTOR_ENVIRONMENT:-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8093/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s