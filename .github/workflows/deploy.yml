name: Deploy Production

on:
  push:
    branches: [master, main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  IMAGE_NAME: astatide-conductor
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      test_passed: ${{ steps.test.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Compile check
        run: uv run python -m compileall conductor/ tests/
      - name: Run tests
        id: test
        run: uv run pytest tests/ -v
      - name: Start Conductor (dev-none, background)
        run: |
          # Boot a Conductor on localhost:8093 in dev-none auth mode for
          # the local E2E scripts. CI env defaults to dev mode (no
          # CONDUCTOR_ENVIRONMENT=production set), so dev-none is allowed.
          # composer.report_dir defaults to /var/lib/conductor which doesn't
          # exist in CI runners — override to a writable temp dir.
          mkdir -p /tmp/composer-reports /tmp/conductor-data
          CONDUCTOR_AUTH__MODE=dev-none \
          CONDUCTOR_COMPOSER__TEST_MODE=true \
          CONDUCTOR_COMPOSER_REPORT_DIR=/tmp/composer-reports \
          CONDUCTOR_STORAGE__SQLITE_PATH=/tmp/conductor-data/conductor.db \
          nohup uv run conductor run --host 127.0.0.1 --port 8093 \
              > /tmp/conductor-ci.log 2>&1 &
          echo $! > /tmp/conductor-ci.pid
          # Wait for health (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8093/health > /dev/null 2>&1; then
              echo "[OK] Conductor CI boot took ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "[FAIL] Conductor did not become healthy in 30s. Logs:"
          cat /tmp/conductor-ci.log
          exit 1
      - name: Local E2E
        run: bash scripts/e2e-local.sh
      - name: Gateway hub E2E
        run: bash scripts/e2e-local-gateway-hub.sh
      - name: Composer local E2E
        run: bash scripts/e2e-composer-local.sh
      - name: Stop Conductor (CI)
        if: always()
        run: |
          if [ -f /tmp/conductor-ci.pid ]; then
            kill "$(cat /tmp/conductor-ci.pid)" 2>/dev/null || true
            rm -f /tmp/conductor-ci.pid
          fi
      - name: Shell prerequisite tests
        run: bash tests/test_e2e_prerequisite_blocks.sh

  build-and-push:
    needs: test
    if: needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx (docker-container driver for GHA cache)
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=composer-v1
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: ${{ vars.DOMAIN }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/ubuntu/infra

            # Pull new image
            docker compose \
              --env-file .env.production \
              -f docker-compose.production.yml \
              pull conductor

            # Rolling restart
            docker compose \
              --env-file .env.production \
              -f docker-compose.production.yml \
              up -d --no-deps conductor

            # Health probe
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8093/health > /dev/null 2>&1; then
                echo "[OK] Conductor healthy after restart"
                break
              fi
              sleep 1
            done

            # Gateway hub check — requires internal-token (cloudflare-access mode)
            INTERNAL_TOKEN=$(grep -E '^CONDUCTOR_AUTH__INTERNAL_SECRET=' /home/ubuntu/infra/.env.production | cut -d= -f2-)
            curl -sf -H "X-Auth-Internal-Token: ${INTERNAL_TOKEN}" \
                http://localhost:8093/gateways/status || echo "[warn] gateways/status check returned non-zero"

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Production health check
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          for ep in health ready version; do
            if ! curl -sf "${DOMAIN}/${ep}" > /dev/null 2>&1; then
              echo "[FAIL] ${DOMAIN}/${ep} unreachable"
              exit 1
            else
              echo "[OK] ${DOMAIN}/${ep}"
            fi
          done
          # /mcp behind CF Access — expect 302 redirect to CF login, NOT 200.
          if ! curl -sf -o /dev/null -w '%{http_code}\n' "${DOMAIN}/mcp" | grep -q '^302$'; then
            echo "[FAIL] ${DOMAIN}/mcp CF Access gate not responding"
            exit 1
          fi
          echo "[OK] ${DOMAIN}/mcp -> 302 to CF Access (live)"